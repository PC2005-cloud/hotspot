<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>热点聚合报告</title>
<style>
:root {
    --bg: #0b1120; --text: #e8ecf2; --sec: #94a3b8; --muted: #5e6d7d;
    --accent: #818cf8; --border: rgba(255,255,255,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: 'Segoe UI','PingFang SC','Inter',system-ui,-apple-system,sans-serif;
    background: radial-gradient(ellipse at 50% 30%, #1a2332 0%, #0b1120 55%, #060c16 100%);
    color: var(--text); padding: 40px 20px; min-height: 100vh;
    -webkit-font-smoothing: antialiased;
}
.wrapper { max-width: 860px; margin: 0 auto; }
.overview { text-align: center; padding: 40px; margin-bottom: 28px; background: rgba(15,23,42,0.5); backdrop-filter: blur(28px); border-radius: 20px; border: 1px solid var(--border); }
.overview h1 { font-size: 28px; font-weight: 800; background: linear-gradient(135deg,#818cf8,#a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 16px; }
.overview .meta { color: var(--sec); font-size: 14px; display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; }
.overview .meta span { background: rgba(255,255,255,0.05); padding: 4px 14px; border-radius: 20px; }
.tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.tab { background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--sec); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; font-family: inherit; }
.tab:hover { border-color: rgba(129,140,248,0.3); color: var(--text); }
.tab.active { background: rgba(129,140,248,0.15); border-color: var(--accent); color: var(--text); }
.tab-count { display: inline-block; background: rgba(255,255,255,0.08); padding: 1px 8px; border-radius: 10px; font-size: 12px; margin-left: 6px; }
.tab.active .tab-count { background: rgba(129,140,248,0.3); }
.tab-pane { display: none; }
.tab-pane.active { display: block; }
.pane-header { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 16px; }
.kw-meta { display: flex; gap: 12px; font-size: 13px; color: var(--sec); }
.card { background: rgba(15,23,42,0.5); backdrop-filter: blur(28px); border-radius: 14px; padding: 20px; margin-bottom: 12px; border: 1px solid var(--border); transition: border-color 0.2s; }
.card:hover { border-color: rgba(129,140,248,0.3); }
.card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 13px; flex-wrap: wrap; }
.rank { background: var(--accent); color: #fff; padding: 2px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
.source { color: #34d399; }
.ptime { color: var(--muted); margin-left: auto; }
h2 { font-size: 17px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
.summary { color: var(--sec); font-size: 14px; line-height: 1.7; margin-bottom: 8px; }
.url-line { margin-bottom: 8px; }
.url-line a { color: #38bdf8; font-size: 13px; word-break: break-all; }
.persp { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 10px 12px; margin-top: 8px; font-size: 13px; line-height: 1.6; }
.stance { display: inline-block; color: #f59e0b; font-weight: 500; margin-bottom: 2px; }
.sentiment { background: rgba(15,23,42,0.5); backdrop-filter: blur(28px); border-radius: 14px; padding: 20px 24px; margin-top: 12px; border: 1px solid var(--border); }
.sentiment h3 { font-size: 14px; margin-bottom: 8px; color: var(--accent); }
.sentiment p { color: var(--sec); font-size: 14px; line-height: 1.7; }
.footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 40px; padding: 20px; }
.empty-state { text-align: center; padding: 80px 40px; background: rgba(15,23,42,0.5); backdrop-filter: blur(28px); border-radius: 20px; border: 1px solid var(--border); }
.empty-state .empty-icon { font-size: 64px; margin-bottom: 20px; }
.empty-state h2 { font-size: 22px; margin-bottom: 12px; }
.empty-state p { color: var(--sec); font-size: 15px; line-height: 1.7; }
</style>
</head>
<body>
<div class="wrapper">
    <div class="overview">
        <h1>热点聚合报告</h1>
        <div class="meta">
            <span>🕐 2026-06-30 13:19 — 2026-06-30 13:19</span>
            <span>⏱ 总耗时 8s</span>
            <span>📄 0/0 成功 · 0 条热点</span>
        </div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div id="panes"></div>
    <div id="empty-state" class="empty-state" style="display:none">
        <div class="empty-icon">📭</div>
        <h2>暂无热点数据</h2>
        <p>本次运行未搜索到热点数据。可能原因：账号被封禁、网络被拦截、或关键词无匹配结果。</p>
    </div>
    <div class="footer">由 Hotspot 自动生成 · 2026-06-30 13:19</div>
    <script>
    var tabs = document.getElementById('tabs');
    var panes = document.getElementById('panes');
    var empty = document.getElementById('empty-state');
    if (tabs.children.length === 0) {
        tabs.style.display = 'none';
        panes.style.display = 'none';
        empty.style.display = 'block';
    }
    document.querySelectorAll('.tab').forEach(function(t) {
        t.addEventListener('click', function() {
            document.querySelectorAll('.tab').forEach(function(b) { b.classList.remove('active'); });
            document.querySelectorAll('.tab-pane').forEach(function(p) { p.classList.remove('active'); });
            t.classList.add('active');
            document.querySelector('.tab-pane[data-tab="' + t.dataset.tab + '"]').classList.add('active');
        });
    });
    </script>
</div>
<script>
document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        t.classList.add('active');
        document.querySelector('.tab-pane[data-tab="' + t.dataset.tab + '"]').classList.add('active');
    });
});
</script>
</body>
</html>
