<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>热点聚合报告</title>
<style>
/* ===== 设计 Token ===== */
:root {
  /* 亮色模式 (默认) */
  --bg-page: #f8fafc;                /* slate-50 */
  --bg-gradient: radial-gradient(ellipse at 50% 0%, rgba(199,210,254,0.3) 0%, rgba(248,250,252,1) 60%);
  --bg-card: rgba(255,255,255,0.4);
  --bg-card-hover: rgba(255,255,255,0.6);
  --bg-tab: rgba(255,255,255,0.35);
  --bg-tab-hover: rgba(255,255,255,0.55);
  --bg-tab-active: rgba(129,140,248,0.15);
  --bg-accent-subtle: rgba(129,140,248,0.08);
  --bg-overview: rgba(255,255,255,0.35);
  --border-card: rgba(255,255,255,0.4);
  --border-card-hover: rgba(129,140,248,0.4);
  --border-tab: rgba(255,255,255,0.4);
  --border-tab-active: #818cf8;
  --border-divider: rgba(0,0,0,0.06);
  --text-primary: #0f172a;           /* slate-900 */
  --text-heading: #1e293b;          /* slate-800 */
  --text-secondary: #64748b;        /* slate-500 */
  --text-muted: #94a3b8;            /* slate-400 */
  --text-body: #475569;             /* slate-600 */
  --text-inverse: #ffffff;
  --accent: #818cf8;                /* indigo-400 */
  --accent-strong: #6366f1;         /* indigo-500 */
  --accent-glow: rgba(129,140,248,0.25);
  --source-color: #059669;          /* emerald-600 */
  --url-color: #0284c7;             /* sky-600 */
  --stance-color: #d97706;          /* amber-600 */
  --shadow-card: 0 4px 24px rgba(0,0,0,0.04), 0 1px 4px rgba(0,0,0,0.04);
  --shadow-card-hover: 0 8px 40px rgba(129,140,248,0.10), 0 2px 8px rgba(0,0,0,0.06);
  --shadow-overview: 0 4px 32px rgba(0,0,0,0.04);
}

.dark {
  --bg-page: #020617;                /* slate-950 */
  --bg-gradient: radial-gradient(ellipse at 50% 25%, #0f1a2e 0%, #020617 60%, #00040a 100%);
  --bg-card: rgba(15,23,42,0.5);     /* slate-800/50 */
  --bg-card-hover: rgba(30,41,59,0.6); /* slate-700/50 */
  --bg-tab: rgba(255,255,255,0.04);
  --bg-tab-hover: rgba(255,255,255,0.08);
  --bg-tab-active: rgba(129,140,248,0.15);
  --bg-accent-subtle: rgba(129,140,248,0.10);
  --bg-overview: rgba(15,23,42,0.5);
  --border-card: rgba(255,255,255,0.06);
  --border-card-hover: rgba(129,140,248,0.35);
  --border-tab: rgba(255,255,255,0.06);
  --border-tab-active: #818cf8;
  --border-divider: rgba(255,255,255,0.06);
  --text-primary: #f1f5f9;           /* slate-100 */
  --text-heading: #ffffff;
  --text-secondary: #94a3b8;         /* slate-400 */
  --text-muted: #64748b;             /* slate-500 */
  --text-body: #cbd5e1;              /* slate-300 */
  --text-inverse: #0f172a;
  --accent: #818cf8;                 /* indigo-400 */
  --accent-strong: #6366f1;          /* indigo-500 */
  --accent-glow: rgba(129,140,248,0.20);
  --source-color: #34d399;           /* emerald-400 */
  --url-color: #38bdf8;              /* sky-400 */
  --stance-color: #f59e0b;           /* amber-400 */
  --shadow-card: 0 4px 24px rgba(0,0,0,0.2);
  --shadow-card-hover: 0 8px 40px rgba(129,140,248,0.12), 0 2px 8px rgba(0,0,0,0.3);
  --shadow-overview: 0 4px 32px rgba(0,0,0,0.3);
}

/* ===== 基础重置 ===== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", "Inter", system-ui, sans-serif;
  background: var(--bg-page);
  background-image: var(--bg-gradient);
  color: var(--text-body);
  padding: 32px 20px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background 1s cubic-bezier(0.22, 1, 0.36, 1), color 0.8s cubic-bezier(0.22, 1, 0.36, 1);
}

/* ===== 滚动条美化 ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--accent-glow); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }
* { scrollbar-width: thin; scrollbar-color: var(--accent-glow) transparent; }

/* ===== 布局容器 ===== */
.wrapper { max-width: 860px; margin: 0 auto; }

/* ===== 主题切换按钮 ===== */
.theme-bar {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 20px;
}
.theme-toggle {
  background: var(--bg-tab);
  border: 1px solid var(--border-tab);
  color: var(--text-secondary);
  width: 36px; height: 36px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
  font-family: inherit;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.theme-toggle:hover {
  background: var(--bg-tab-hover);
  border-color: var(--border-card-hover);
  color: var(--accent);
  transform: scale(1.05);
}
.theme-toggle:active { transform: scale(0.95); }

/* ===== 概览头部 ===== */
.overview {
  text-align: center;
  padding: 40px 32px;
  margin-bottom: 28px;
  background: var(--bg-overview);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border-radius: 24px;
  border: 1px solid var(--border-card);
  box-shadow: var(--shadow-overview);
  transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
  position: relative;
}
.blog-badge {
  position: absolute;
  top: 16px;
  left: 20px;
}
.blog-badge a {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 12px;
  background: var(--bg-accent-subtle);
  border: 1px solid var(--border-divider);
  border-radius: 20px;
  color: var(--accent);
  font-size: 12px;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.3s;
}
.blog-badge a:hover {
  background: var(--bg-tab-active);
  border-color: var(--accent);
  transform: translateY(-1px);
}
.overview h1 {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, var(--accent), #a5b4fc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 18px;
}
.overview .meta {
  color: var(--text-secondary);
  font-size: 13px;
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}
.overview .meta span {
  background: var(--bg-accent-subtle);
  border: 1px solid var(--border-divider);
  padding: 5px 16px;
  border-radius: 20px;
  font-weight: 500;
  transition: all 0.3s;
}

/* ===== 标签导航 ===== */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.tab {
  background: var(--bg-tab);
  border: 1px solid var(--border-tab);
  color: var(--text-secondary);
  padding: 10px 20px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  font-family: inherit;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  letter-spacing: -0.01em;
}
.tab:hover {
  border-color: var(--border-card-hover);
  color: var(--text-heading);
  background: var(--bg-tab-hover);
  transform: translateY(-1px);
}
.tab.active {
  background: var(--bg-tab-active);
  border-color: var(--border-tab-active);
  color: var(--accent);
  box-shadow: 0 0 20px var(--accent-glow);
}
.tab-count {
  display: inline-block;
  background: var(--border-divider);
  padding: 1px 9px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
  margin-left: 6px;
  vertical-align: middle;
  transition: all 0.25s;
}
.tab.active .tab-count {
  background: rgba(129,140,248,0.25);
  color: var(--accent);
}

/* ===== 标签面板 ===== */
.tab-pane { display: none; }
.tab-pane.active { display: block; }

.pane-header {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  margin-bottom: 20px;
}
.kw-meta {
  display: flex;
  gap: 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
}
.kw-meta span {
  background: var(--bg-accent-subtle);
  border: 1px solid var(--border-divider);
  padding: 4px 14px;
  border-radius: 16px;
}

/* ===== 热点卡片 ===== */
.card {
  background: var(--bg-card);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: 18px;
  padding: 22px 24px;
  margin-bottom: 14px;
  border: 1px solid var(--border-card);
  box-shadow: var(--shadow-card);
  transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  will-change: transform;
}
.card:hover {
  border-color: var(--border-card-hover);
  background: var(--bg-card-hover);
  box-shadow: var(--shadow-card-hover);
  transform: scale(1.015);
}

.card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  font-size: 12px;
  flex-wrap: wrap;
}
.rank {
  background: linear-gradient(135deg, var(--accent), var(--accent-strong));
  color: var(--text-inverse);
  padding: 2px 11px;
  border-radius: 7px;
  font-size: 11px;
  font-weight: 700;
  box-shadow: 0 2px 8px var(--accent-glow);
}
.source {
  color: var(--source-color);
  font-weight: 600;
}
.ptime {
  color: var(--text-muted);
  margin-left: auto;
  font-size: 11px;
}

.card h2 {
  font-size: 17px;
  font-weight: 800;
  line-height: 1.45;
  margin-bottom: 10px;
  color: var(--text-heading);
  letter-spacing: -0.02em;
}
.summary {
  color: var(--text-body);
  font-size: 14px;
  line-height: 1.75;
  margin-bottom: 10px;
}
.url-line { margin-bottom: 10px; }
.url-line a {
  color: var(--url-color);
  font-size: 13px;
  font-weight: 500;
  word-break: break-all;
  text-decoration: none;
  transition: opacity 0.2s;
}
.url-line a:hover { opacity: 0.75; text-decoration: underline; }

/* ===== 多方视角 ===== */
.persp {
  background: var(--bg-accent-subtle);
  border: 1px solid var(--border-divider);
  border-radius: 10px;
  padding: 12px 14px;
  margin-top: 10px;
  font-size: 13px;
  line-height: 1.65;
  transition: all 0.3s;
}
.persp:hover {
  border-color: var(--border-card-hover);
}
.stance {
  display: inline-block;
  color: var(--stance-color);
  font-weight: 700;
  margin-bottom: 4px;
  font-size: 12px;
  letter-spacing: -0.01em;
}

/* ===== 舆情总结 ===== */
.sentiment {
  background: var(--bg-card);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: 18px;
  padding: 22px 24px;
  margin-top: 20px;
  border: 1px solid var(--border-card);
  box-shadow: var(--shadow-card);
  transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}
.sentiment:hover {
  border-color: var(--border-card-hover);
  box-shadow: var(--shadow-card-hover);
}
.sentiment h3 {
  font-size: 14px;
  font-weight: 800;
  margin-bottom: 10px;
  color: var(--accent);
  letter-spacing: -0.01em;
}
.sentiment p {
  color: var(--text-body);
  font-size: 14px;
  line-height: 1.75;
}

/* ===== 页脚 ===== */
.footer {
  text-align: center;
  color: var(--text-muted);
  font-size: 12px;
  margin-top: 48px;
  padding: 24px;
  letter-spacing: 0.02em;
}
.footer-blog {
  margin-top: 8px;
}
.footer-blog a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 600;
  transition: opacity 0.2s;
}
.footer-blog a:hover { opacity: 0.75; }

/* ===== 空状态 ===== */
.empty-state {
  text-align: center;
  padding: 80px 40px;
  background: var(--bg-card);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border-radius: 24px;
  border: 1px solid var(--border-card);
  box-shadow: var(--shadow-card);
  transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}
.empty-state .empty-icon { font-size: 64px; margin-bottom: 20px; display: block; }
.empty-state h2 {
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 12px;
  color: var(--text-heading);
}
.empty-state p {
  color: var(--text-secondary);
  font-size: 15px;
  line-height: 1.7;
}

/* ===== 入场动画 ===== */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.overview { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both; }
.tab-pane.active .card:nth-child(1) { animation: fadeUp 0.5s 0.05s both; }
.tab-pane.active .card:nth-child(2) { animation: fadeUp 0.5s 0.10s both; }
.tab-pane.active .card:nth-child(3) { animation: fadeUp 0.5s 0.15s both; }
.tab-pane.active .card:nth-child(4) { animation: fadeUp 0.5s 0.20s both; }
.tab-pane.active .card:nth-child(5) { animation: fadeUp 0.5s 0.25s both; }
.tab-pane.active .card:nth-child(6) { animation: fadeUp 0.5s 0.30s both; }
.tab-pane.active .card:nth-child(7) { animation: fadeUp 0.5s 0.35s both; }
.tab-pane.active .card:nth-child(8) { animation: fadeUp 0.5s 0.40s both; }
.tab-pane.active .card:nth-child(9) { animation: fadeUp 0.5s 0.45s both; }
.tab-pane.active .card:nth-child(10){ animation: fadeUp 0.5s 0.50s both; }

/* ===== 响应式 ===== */
@media (max-width: 640px) {
  body { padding: 16px 12px; }
  .overview { padding: 28px 20px; border-radius: 20px; }
  .overview h1 { font-size: 22px; }
  .overview .meta { font-size: 12px; gap: 8px; }
  .overview .meta span { padding: 4px 12px; }
  .card { padding: 16px 18px; border-radius: 14px; }
  .card h2 { font-size: 15px; }
  .tab { padding: 8px 14px; font-size: 13px; }
  .sentiment { padding: 16px 18px; border-radius: 14px; }
  .empty-state { padding: 48px 24px; }
}
</style>
</head>
<body>

<div class="wrapper">
  <!-- 主题切换 -->
  <div class="theme-bar">
    <button class="theme-toggle" id="themeToggle" title="切换主题" onclick="toggleTheme()">🌙</button>
  </div>

  <!-- 概览 -->
  <div class="overview">
    <div class="blog-badge">
      <a href="https://www.lxpavilion.top" target="_blank" rel="noopener" title="栏轩阁 · 个人博客">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <span>欢迎关注 → 栏轩阁</span>
      </a>
    </div>
    <h1>🔥 热点聚合报告</h1>
    <div class="meta">
      <span>🕐 2026-07-02 10:46 — 2026-07-02 10:46</span>
      <span>⏱ 总耗时 11s</span>
      <span>📄 0/0 成功 · 0 条热点</span>
    </div>
  </div>

  <!-- 标签页导航 -->
  <div class="tabs" id="tabs"></div>

  <!-- 内容面板 -->
  <div id="panes"></div>

  <!-- 空状态 -->
  <div id="empty-state" class="empty-state" style="display:none">
    <span class="empty-icon">📭</span>
    <h2>暂无热点数据</h2>
    <p>本次运行未搜索到热点数据。可能原因：账号被封禁、网络被拦截、或关键词无匹配结果。</p>
  </div>

  <!-- 页脚 -->
  <div class="footer">
    <div>由 Hotspot 自动生成 · 2026-07-02 10:46</div>
    <div class="footer-blog">
      如果感兴趣，欢迎访问 <a href="https://www.lxpavilion.top" target="_blank" rel="noopener">栏轩阁 · 个人技术博客</a> 获取更多内容
    </div>
  </div>
</div>

<script>
(function() {
  // ── 主题管理 (跨子域 cookie + localStorage 双写, 与 blog.lxpavilion.top 同步) ──
  var KEY = 'blog-theme';
  var DOMAIN = '.lxpavilion.top';
  var html = document.documentElement;
  var btn = document.getElementById('themeToggle');

  // 从 cookie 读取主题
  function getCookie(name) {
    var m = document.cookie.match('(?:^|;)\\s*' + name + '=([^;]+)');
    return m ? decodeURIComponent(m[1]) : null;
  }
  // 写入 cookie (跨子域共享)
  function setCookie(name, value) {
    document.cookie = name + '=' + encodeURIComponent(value) +
      '; domain=' + DOMAIN +
      '; path=/' +
      '; max-age=' + (365 * 24 * 3600) +
      '; SameSite=Lax';
  }

  function getTheme() {
    // 优先读 cookie (跨子域同步), 其次 localStorage, 默认 dark
    return getCookie(KEY) || localStorage.getItem(KEY) || 'dark';
  }
  function applyTheme(theme) {
    var isDark = theme === 'dark';
    html.classList.toggle('dark', isDark);
    if (btn) btn.textContent = isDark ? '🌙' : '☀️';
  }
  window.toggleTheme = function() {
    var next = html.classList.contains('dark') ? 'light' : 'dark';
    setCookie(KEY, next);
    try { localStorage.setItem(KEY, next); } catch(e) {}
    applyTheme(next);
  };
  applyTheme(getTheme());

  // ── 标签切换 ──
  var tabsEl = document.getElementById('tabs');
  var panesEl = document.getElementById('panes');
  var emptyEl = document.getElementById('empty-state');

  if (!tabsEl || tabsEl.children.length === 0) {
    if (tabsEl) tabsEl.style.display = 'none';
    if (panesEl) panesEl.style.display = 'none';
    if (emptyEl) emptyEl.style.display = 'block';
  }

  var tabButtons = document.querySelectorAll('.tab');
  var tabPanes  = document.querySelectorAll('.tab-pane');

  function activateTab(tabBtn) {
    tabButtons.forEach(function(b) { b.classList.remove('active'); });
    tabPanes.forEach(function(p) { p.classList.remove('active'); });
    tabBtn.classList.add('active');
    var pane = document.querySelector('.tab-pane[data-tab="' + tabBtn.dataset.tab + '"]');
    if (pane) pane.classList.add('active');
  }

  tabButtons.forEach(function(t) {
    t.addEventListener('click', function() { activateTab(t); });
  });
})();
</script>
